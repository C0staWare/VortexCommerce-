server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Configuración de Redis para el Rate Limiter
  data:
    redis:
      host: localhost
      port: 6379

  # Configuración de Seguridad con Keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/eventura # Asumiendo Keycloak en localhost:8080

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true # Habilita rutas automáticas basadas en Eureka
      routes:
        - id: product-service
          uri: lb://product-service # Balanceo de carga vía Eureka
          predicates:
            - Path=/api/v1/products/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10 # Peticiones por segundo permitidas
                redis-rate-limiter.burstCapacity: 20 # Ráfaga máxima
                redis-rate-limiter.requestedTokens: 1
            - TokenRelay= # Propaga el JWT al servicio de destino

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - TokenRelay=

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Exposición de métricas para Prometheus
management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0 # 100% de trazas enviadas a Zipkin para desarrollo
