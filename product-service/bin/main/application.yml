server:
  port: 8081

spring:
  application:
    name: product-service

  # R2DBC contra la base de datos 'products_db' en el contenedor 'postgres'
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/products_db
    username: eventura_user
    password: eventura_password

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/eventura

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
